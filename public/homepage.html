<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting System - Homepage</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="top-bar">
        <div class="brand">
            <span class="brand-mark">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 3L4 7v5c0 4.6 3.2 8.9 8 10 4.8-1.1 8-5.4 8-10V7l-8-4z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
                    <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            VoteChain
        </div>
        <p id="accountAddress">Logged in as <span></span></p>
    </header>

    <main class="page-shell">
        <div class="page-head">
            <h1>Cast your vote</h1>
        </div>

        <div class="nav-tabs">
            <button data-tab="candidates" class="active">Candidates</button>
            <button data-tab="results">Poll Results</button>
        </div>

        <div id="candidates" class="tab-content active">
            <h2>Candidates</h2>
            <div id="candidatesList"></div>
        </div>

        <div id="results" class="tab-content">
            <h2>Poll Results</h2>
            <div class="chart-card">
                <canvas id="resultsChart" width="400" height="200"></canvas>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 VoteChain. All rights reserved.</p>
    </footer>

    <div class="alert" id="alertMessage"></div>

    <script src="js/homepage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/chart.js"></script>
</body>

</html>
