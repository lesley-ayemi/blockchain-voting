<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting System - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="brand">
                <span class="brand-mark">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3L4 7v5c0 4.6 3.2 8.9 8 10 4.8-1.1 8-5.4 8-10V7l-8-4z" stroke="#fff" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                VoteChain
            </div>
            <h2>Welcome back</h2>
            <p class="subtitle">Connect your wallet to verify your identity and cast your vote securely on-chain.</p>
            <button id="loginButton">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.5 4L13.3 9.7l1.3-3.4L20.5 4z" fill="#fff"/>
                    <path d="M3.5 4l7.1 5.8L9.4 6.3 3.5 4zM17.6 16.6l-2 3.1 4.3 1.2 1.2-4.2-3.5-.1zM3 16.7l1.2 4.2 4.3-1.2-2-3.1-3.5.1z" fill="#fff"/>
                </svg>
                Login with MetaMask
            </button>
            <p class="fine-print">Your wallet, your identity — no passwords required.</p>
        </div>
    </div>
    <div class="alert" id="alertMessage"></div>
    <script src="js/login.js"></script>
</body>

</html>
